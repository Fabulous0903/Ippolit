display_name = "'The art of studying'"
item_description = """ 'The art of studying' by Feynman McPherron. You open the book and read the introduction:

'Everyday you wake up with two choices; To do what you normally do, following your routine, and excperiencing nothing new. \
This isn't necessarily the wrong choice, having a healthy routine gives your life stability and predictability which, in the end, is the goal of most people. \
However, this comes at the cost of what i would say is to truly live. When every single day is almost exactly the same, they blend together, \
and all you remember in the end is those rare moments were the routine was broken. 

But how can you achieve a safe and predictable life without sacrificing your soul? \
You choose option two! And what is option two you say? well it is to learn ofcourse! When you read, when you learn, you experience someone elses experiences by just sitting still.\
It is the poor mans way of truly living, it's cheap and it does the job. You are able to vicariously experience things you never would or could have normally. \
I'm not saying to not go out and do new things, but if you wakeup and incorporate studying into your daily routine, then you will experience something new everyday.

And in this book i will teach you how to learn in the best way possible, my way, which ...'

You really have no interest in learning how to learn, so you close the book.
"""
