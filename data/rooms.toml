###___Start_rooms___###

[rooms.start]

display_name = "The abyss"
bg_image = "placeholder.png"
music = "placeholder.ogg"

on_enter_first_sunset = """You try to look, you try to smell, you try to listen, and you try to feel, but nothing happens. \
Your attempts to reach out to your surroundings are futile, for you have no body. Only your conciousness exists in this void, \
a place that is devoid of all sensation.

Vague images of ways out drips into your mind, and a sense of direction emerges. When facing north, the collage of vague images transform into something more concrete. \
You see the images of a person who is preaching with conviction to a mass of people. They're trying to convinve the group of their idealistic ideas. 

Turning east you see a small room crammed with books stacked all the way up to the ceiling. \
In the centre of the room a person sits at a cluttered wooden desk, deeply invested in reading. \
A single desk lamp shines a sickly yellow light on the only clear surface of the desk, an area that is just big enough to fit their book.

In the west you see the image of finished battle. A windswept plain of tall grass that sinks into the horizon, strewn with the countless bodies and colorful banners of dead soldiers. \
In the center of the frame you see a single person standing. With their bloody sword pointed down at the ground in exhaustion, they look at the sea of death surrounding them.

Lastly, in the south you see the image of a person all alone in a hospital bed. It seems that they arent far from death, and they have an expression of contemplation on their gaunt face. \
On the bedside table sits a petty bouquet of withered flowers. Aside from the flowers, the sterile hospital room is completely empty.

You have a strong feeling that the direction you choose to go will affect the experience that awaits you. \
If the anxiety of making a choice is too much, the option of doing nothing is always present..."""

on_look = "There is no light"
on_smell = "There is no smell"
on_listen = "There is no sound"
on_feel = "There is no touch"

actions = "actions that are possible in room"
current_room_items = []
time_tag = "none"   
type_of_room = "confined"

