In the far corner you see the bones of a creature. Traveling outside now would be unwise, you should wait for sunset."""

on_enter_sunset = """You find yourself in a dark and damp limestone cave, leisurely sculpted  by the flow of water.
Stalactites and stalagmites clutter the roof and floor of the cave, making the place resemble the inside of the jaws of a beast.
In the far corner, were the light of your torch barely touches, you can make out the faintest form of the bones of a creature."""

on_enter_night = """You find yourself in a dark and damp limestone cave, leisurely sculpted  by the flow of water.
