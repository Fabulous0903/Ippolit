###___Main_rooms___###

[rooms.desert_cave]
display_name = "desert cave"
bg_image = "desertcave.png"
music = "soundsofsand.ogg"

# Text box
on_enter_first_day = """A beam of light shines from the entrance. You find yourself in a damp limestone cave, leisurely sculpted  by the flow of water.
Stalactites and stalagmites clutter the roof and floor of the cave, making the place resemble the inside of the jaws of a beast.
In the far corner you see the bones of a creature. Traveling outside now would be unwise, you should wait for sunset."""

on_enter_first_sunset = """Cool air from outside flows through your nostrils and deep into your lungs, marking the setting of the sun. \
Rubbing your feet together under your blanket, and opening your eyes slightly. You find yourself in a dark and damp limestone cave, leisurely sculpted  by the flow of water. \
Stalactites and stalagmites clutter the roof and floor of the cave mixing together, giving the cave the semblence of some living thing. \
Your slender kebbie leans on your satchel on the ground."""

on_enter_first_night = "With your eyes closed, you listen; there is no sound coming from outside."

on_enter_first_sunrise = """A sliver of light shines from the entrance. You find yourself in a damp limestone cave, leisurely sculpted  by the flow of water.
Stalactites and stalagmites clutter the roof and floor of the cave, making the place resemble the inside of the jaws of a beast.
In the far corner you see the bones of a creature. Traveling outside now would be unwise, you should wait for sunset."""

on_enter_day = """A beam of light shines from the entrance. You find yourself in a damp limestone cave, leisurely sculpted  by the flow of water.
